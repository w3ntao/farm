name: update_trend

on:
  #push: # don't trigger workflow from push
  #  branches: ["main"]

  schedule:
    - cron: "0 20 * * 5"
    # runs at 04:00 every Saturday, Beijing time
    # 20:00 UTC Friday = 01:00 Beijing Saturday
    # cron may be delayed by GitHub Actions
  workflow_dispatch:

permissions:
  contents: write
  # so github bot could commit changes

jobs:
  update-trend:
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash # now you can use pushd and popd

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v6

      - name: install dependencies
        run: |
          pip install --upgrade -r requirements.txt

      - name: Set DATE variable
        env:
          TZ: Asia/Shanghai
        run: |
          echo "STOCK_DATE=$(python market_utility.py --last_stock_date)" >> $GITHUB_ENV

      - name: clone quant-tracer
        run: |
          git clone https://x-access-token:${{ secrets.KEY_QUANT_TRACER }}@github.com/w3ntao/quant-tracer.git
          pip install --upgrade -r quant-tracer/requirements.txt

      - name: trace stocks
        run: |
          pushd quant-tracer
          python quant_tracer.py

          timeout 2h python quant_tracer.py --trend
          timeout 5m python quant_tracer.py --trend > "../trend/trend.txt"

          popd

      - name: archive stock cache
        run: |
          pushd quant-tracer/cache
          zip -r "${GITHUB_WORKSPACE}/${STOCK_DATE}.zip" "${STOCK_DATE}"
          popd

      - name: publish stock cache release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.STOCK_DATE }}
          name: cache-${{ env.STOCK_DATE }}
          body: |
            daily cache: ${{ env.STOCK_DATE }}
          files: ${{ env.STOCK_DATE }}.zip

      - name: commit changes
        run: |
          git config user.name "Wentao Liu"
          git config user.email "wentao.liu.zero@outlook.com"

          git pull
          git add -u

          git commit -m "[ci-bot] weekly trend: ${STOCK_DATE}" || echo "No changes"
          git push -u origin main

          git checkout -B trend-${STOCK_DATE}
          git push -u origin trend-${STOCK_DATE}
